<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/pages.css">
    <title>Posting - Autenticação</title>
</head>

<body id="body" class="body-layout-1">

<div id="overlay" class=""></div>

<div id="loader" class="loader invisible">
    <div class="bar1"></div>
    <div class="bar2"></div>
    <div class="bar3"></div>
    <div class="bar4"></div>
    <div class="bar5"></div>
    <div class="bar6"></div>
    <div class="bar7"></div>
    <div class="bar8"></div>
    <div class="bar9"></div>
    <div class="bar10"></div>
    <div class="bar11"></div>
    <div class="bar12"></div>
</div>

<aside class="aside-layout-1" style=" border-radius: 0; border-top: 0; justify-content: center; align-items: center; flex: 1 1 550px;">
    <div style="display: flex; flex-direction: column;">

        <div style="margin-bottom: 30px;">
            <h1 class="auth-text">Bem vindo</h1>
            <p class="auth-text" style="opacity: 50%;">Por favor preencha os campos com suas credenciais</p>
        </div>

            <!-- Login -->
            <form id="form-login" class="form-auth">
                <fieldset class="fieldset-small-form">
                    <div class="form-auth-fields">
                        <label for="input-login-email" class="labels-small-form">Email</label>
                        <img class="icon-auth" src="img/mail.svg">
                        <input id="input-login-email"
                               class="inputs-small-form selection-focus"
                               name="email"
                               required placeholder="usuario@email.com"
                               autocomplete="new-password">

                    </div>

                    <div class="form-auth-fields">
                        <label for="input-login-password" class="labels-small-form">Senha</label>
                        <img class="icon-auth" src="img/lock-keyhole.svg">
                        <input id="input-login-password"
                                type="password"
                                  class="inputs-small-form selection-focus"
                                  name="password" required placeholder="•••••••••••••••••"
                                  autocomplete="new-password"></input>
                        <button id="login-button-eye" type="button" class="button-eye selection" ></button>
                    </div>

                    <div class="form-checkbox-field" style="display: flex; align-content: center;">
                        <input id="input-login-checkbox" type="checkbox" name="rememberMe" style="width: 20px">
                        <p style="color: var(--color-white); font-family: var(--font-poppins);">Lembrar de mim</p>
                    </div>

                    <div class="form-auth-fields" style="margin-top: 30px;">
                        <input id="input-login-submit"
                               class="submit-small-form inputs-small-form opacity"
                               type="submit" value="Entrar" style="padding: 0">

                               <div style="display: flex; justify-content: center; gap: 5px; margin-top: 10px;">
                                   <p style="font-family: var(--font-poppins); text-align: center; color: var(--color-white); opacity: 50%;">Novo por aqui?</p>
                                    <a id="button-register-redirect" class="buttons-redirect-auth">Crie sua conta</a>
                               </div>
                    </div>
                </fieldset>
            </form>

            <!-- Register -->
             <form id="form-register" class="form-auth display-invisible">
                <fieldset class="fieldset-small-form">

                    <div class="form-auth-fields">
                        <label for="input-register-name" class="labels-small-form">Nome</label>
                        <img class="icon-auth" src="img/mail.svg">
                        <input id="input-register-name"
                               class="inputs-small-form selection-focus"
                               name="name"
                               required placeholder="Nome para exibição"
                               autocomplete="new-password">

                    </div>

                    <div class="form-auth-fields">
                        <label for="input-register-email" class="labels-small-form">Email</label>
                        <img class="icon-auth" src="img/mail.svg">
                        <input id="input-register-email"
                               class="inputs-small-form selection-focus"
                               name="email"
                               required placeholder="usuario@email.com"
                               autocomplete="new-password">

                    </div>

                    <div class="form-auth-fields">
                        <label for="input-register-password" class="labels-small-form">Senha</label>
                        <img class="icon-auth" src="img/lock-keyhole.svg">
                        <input id="input-register-password"
                                type="password"
                                  class="inputs-small-form selection-focus"
                                  name="password" required placeholder="•••••••••••••••••"
                                  autocomplete="new-password"></input>
                        <button id="register-button-eye" type="button" class="button-eye selection" ></button>
                    </div>

                    <div class="form-auth-fields">
                        <label for="input-register-password-confirm" class="labels-small-form">Confirme sua Senha</label>
                        <img class="icon-auth" src="img/lock-keyhole.svg">
                        <input id="input-register-password-confirm"
                                type="password"
                                  class="inputs-small-form selection-focus"
                                  name="description" required placeholder="•••••••••••••••••"
                                  autocomplete="new-password"></input>
                        <button id="register-button-confirm-eye" type="button" class="button-eye selection" ></button>
                    </div>

                    <div class="form-auth-fields" style="margin-top: 30px;">
                        <input id="input-register-submit"
                               class="submit-small-form inputs-small-form opacity"
                               type="submit" value="Criar conta" style="padding: 0">

                               <div style="display: flex; justify-content: center; gap: 5px; margin-top: 10px;">
                                   <p style="font-family: var(--font-poppins); text-align: center; color: var(--color-white); opacity: 50%;">Já tem uma conta?</p>
                                    <a id="button-login-redirect" class="buttons-redirect-auth">Entrar</a>
                               </div>
                    </div>
                </fieldset>
            </form>
    </div>
</aside>

<main class="main-layout-1" style="background-color: transparent; border: none; margin: 50px; border-radius: 15px;  align-items: center; justify-content: center; overflow-y: scroll; max-height: calc(100vh - 114px);">

    <div style="margin-left: 10%; width: 100%;">
        <img src="img/posting_logo.png" style="width: 100%; margin: 0;">
        <h1 class="auth-title" style="font-size: 35px; margin-left: 6%;">Dê vida às suas ideias.</h1>
        <p class="auth-title" style="margin-left: 6%;">Compartilhe ideias.
            Transforme pensamentos em posts.</p>

    </div>
    
</main>


<script src="js/components/screen-standart.js"></script>;
<script src="js/core/auth.js"></script>;
<script src="js/pages/user.js"></script>;
<script src="js/core/exception-handler.js"></script>;
<script src="js/pages/posts.js"></script>;
<script src="js/pages/login.js"></script>;
<script src="js/pages/register.js"></script>;



</body>

</html>
