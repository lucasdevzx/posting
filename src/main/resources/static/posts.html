<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utilities.css">
    <link rel="stylesheet" href="css/pages.css">
    <title>Title</title>
</head>

<body id="body" class="body-layout-1">

<div id="overlay" class=""></div>

<div id="loader" class="loader invisible">
    <div class="bar1"></div>
    <div class="bar2"></div>
    <div class="bar3"></div>
    <div class="bar4"></div>
    <div class="bar5"></div>
    <div class="bar6"></div>
    <div class="bar7"></div>
    <div class="bar8"></div>
    <div class="bar9"></div>
    <div class="bar10"></div>
    <div class="bar11"></div>
    <div class="bar12"></div>
</div>

<header class="header-layout-1" style="background-color: var(--third-color);  border-radius: 0; justify-content: center; align-items: center;">
    <div class="main-title-container">
        <a class="main-title" href="index.html">
        Posting
        </a>
        <img class="main-title-icon selection" src="img/newspaper.svg">
    </div>
    <a id="bounce-login" class="display-invisible selection selection-border" href="auth.html">Conectar</a>
    <a id="bounce-profile" class="selection display-visible" href="post.html"></a>
</header>

<aside class="aside-layout-1" style=" border-radius: 0; border-top: 0; justify-content: center; align-items: start;">
    <div style="display: flex; flex-direction: column;">
        <div class="aside-links">
            <a id="" class="aside-text-decoration" href="posts-hub.html">
                <img class="aside-links-img" src="img/book-plus.svg" fetchpriority="high">
                Postar
            </a>
        </div>
    <div class="aside-left-container">
        <div class="aside-links">
            <a id="aside-button-search" class="aside-text-decoration">
                <img class="aside-links-img" src="img/search.svg" fetchpriority="high">
                Buscar
            </a>
        </div>
        <div id="aside-button-home-container" class="aside-links">
            <a id="aside-button-home" class="aside-text-decoration" href="posts.html">
                <img id="aside-button-home-img" class="aside-links-img" src="img/house.svg"
                     fetchpriority="high">
                Início
            </a>
        </div>
        <div class="aside-links">
            <a class="aside-text-decoration">
                <img class="aside-links-img" src="img/user-round.svg" fetchpriority="high">
                Perfil
            </a>
        </div>
        <div class="aside-links">
            <a class="aside-text-decoration">
                <img class="aside-links-img" src="img/globe-lock.svg" fetchpriority="high">
                Admin
            </a>
        </div>
    </div>
    </div>
</aside>

<main id="container-posts" class="main-layout-1" style="margin: 50px; border-radius: 15px;  align-items: center; overflow-y: scroll; max-height: calc(100vh - 224px);">

    <div>

    </div>

    <!-- Modal Info -->
    <div id="modal-info" class="modal-sm-horizontal display-invisible closing" style=" flex-direction: column;">
        <button id="button-profile-post" class="buttons-info selection ">
            <img id="img-button-profile-post" class="images-info" src="img/user-round.svg">
            Perfil
        </button>

        <button id="button-edit-post" class="buttons-info selection" >
            <img id="img-button-edit-post" class="images-info" src="img/pencil.svg">
            Editar Postagem
        </button>

        <button id="button-delete-post" class="buttons-info selection">
            <img id="img-button-delete-post" class="images-info" src="img/trash-2.svg">
            Excluir Postagem
        </button>


        <div id="confirm-message-delete" class="buttons-info display-invisible" style="border-top: 1px solid rgba(139, 148, 158, 0.15); pointer-events: none ">
            <img id="" class="images-info" src="img/circle-alert.svg">
            <p>Deseja Excluir ?</p>
        </div>

        <div id="confirm-buttons-delete" class="display-invisible" style=" ">
                <button id="delete-post-button-confirm" class="buttons-info selection" style="justify-content: center; align-items: center;">
                    Confirmar
                </button>
                <button id="delete-post-button-cancel" class="buttons-info selection" style="justify-content: center; align-items: center;">
                    Cancelar
                </button>
        </div>
    </div>

    <img id="logo-loading" src="/img/newspaper.svg" class="logo display-invisible" style="position: absolute; width: 10%;">

        <!--Cards-->

</main>

<aside class="aside-layout-1 slide-in" style="display:none; border-radius: 0; flex-basis: 500px; border-top: 0; justify-content: start; align-items: center">

</aside>

<script src="js/components/screen-standart.js"></script>;
<script src="js/core/auth.js"></script>;
<script src="js/pages/user.js"></script>;
<script src="js/core/exception-handler.js"></script>;
<script src="js/pages/posts.js"></script>;

</body>

</html>
